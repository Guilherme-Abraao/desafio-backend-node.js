version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: challenge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: likes_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: challenge-redis
    ports:
      - "6379:6379"
  api:
    build: .
    container_name: challenge-api
    ports:
      - "3333:3333"
    environment:
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/likes_db?schema=public
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

volumes:
  pgdata: